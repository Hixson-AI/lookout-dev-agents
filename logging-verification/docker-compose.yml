version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lookout
      POSTGRES_PASSWORD: lookout
      POSTGRES_DB: logging_verification
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lookout"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
