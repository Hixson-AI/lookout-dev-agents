services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lookout-dev-agents-postgres
    environment:
      POSTGRES_DB: agents_rag
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-general-rag.sql:/docker-entrypoint-initdb.d/01-init-rag.sql
      - ../scripts/init-reports.sql:/docker-entrypoint-initdb.d/02-init-reports.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agents_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  reports-api:
    build:
      context: ../apps/reports-api
      dockerfile: Dockerfile
    container_name: lookout-reports-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agents_rag
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REPORTS_API_PORT: 3456
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/reports-api/src:/app/src
    command: npm run start

  reports-ui:
    build:
      context: ../apps/reports-ui
      dockerfile: Dockerfile
    container_name: lookout-reports-ui
    environment:
      VITE_API_BASE: http://localhost:3456
    ports:
      - "5173:5173"
    depends_on:
      - reports-api
    volumes:
      - ../apps/reports-ui/src:/app/src
    command: npm run dev -- --host

volumes:
  postgres_data:
